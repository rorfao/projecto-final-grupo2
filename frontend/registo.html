<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TuGartes e TuFícios - Registo</title>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Text:wght@400;700&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header">
        <div class="logo">
            <div class="logo-symbol"></div><img src="./assets/logo.jpg" alt="logo" height="70px">  
            <div>
                <div class="logo-title">TUGARTES<br>E TUFÍCIOS</div>
                <div class="logo-subtitle">FEITO COM AMOR</div>
            </div>
        </div>
        <nav class="menu">
            <a href="index.html">Home</a>
            <a href="catalogo.html">Catálogo</a>
            <a href="registo.html">Registo</a>
            <a href="about.html">Sobre Nós</a>
        </nav>
    </header>    
</head>
<body>

<div class="container-registo">
    <h5>Registo de Atelier</h5>
    <form id="formulario">
        <div class="form-group">
            <label>Nome <span class="required">*</span></label>
            <input type="text" id="nome" maxlength="150" required>
        </div>
        <div class="form-group">
            <label>Atividade <span class="required">*</span></label>
            <input type="text" id="atividade" maxlength="50" required>
        </div>
        <div class="form-group">
            <label>Distrito <span class="required">*</span></label>
            <input type="text" id="distrito" maxlength="50" required>
        </div>
        <div class="form-group">
            <label>Concelho <span class="required">*</span></label>
            <input type="text" id="concelho" maxlength="100" required>
        </div>
        <div class="form-group">
            <label>Morada</label>
            <input type="text" id="morada" maxlength="200">
        </div>
        <div class="form-group">
            <label>Telefone</label>
            <input type="tel" id="telefone" maxlength="15">
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" maxlength="100">
        </div>
        <div class="form-group">
            <label>Website</label>
            <input type="url" id="website" maxlength="150" placeholder="https://www.exemplo.pt">
        </div>
        <div class="form-group">
            <label>Descrição <span class="required">*</span></label>
            <textarea id="descricao" maxlength="500" required></textarea>
        </div>
        <div class="form-group">
            <label>URL da Imagem</label>
            <input type="url" id="url_imagem" maxlength="100">
        </div>
        <button type="submit">Guardar</button>
    </form>
    <div id="mensagem"></div>
</div>
<script src="app.js"></script>
</body>
</html>
