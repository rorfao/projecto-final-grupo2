<body>
 <div class="registo-artesao">Registo de Artesão</div>

 </div>
    <div class="container">
       
        <h4>Registo de Entidade<h4>

        <form id="formulario">

            <div class="form-group">
                <label>Nome <span class="required">*</span></label>
                <input type="text" id="nome" maxlength="150" required>
            </div>

            <div class="form-group">
                 <label>Atividade <span class="required">*</span></label>
                <input type="text" id="atividade" maxlength="50" required>
            </div>

            <div class="form-group">
                <label>Distrito <span class="required">*</span></label>
                <input type="text" id="distrito" maxlength="50" required>
            </div>

            <div class="form-group">
                <label>Concelho <span class="required">*</span></label>
                <input type="text" id="concelho" maxlength="100" required>
            </div>

            <div class="form-group">
                <label>Morada</label>
                 <input type="text" id="morada" maxlength="200">
             </div>

             <div class="form-group">
                 <label>Telefone</label>
                 <input type="tel" id="telefone" maxlength="15">
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" maxlength="100">
            </div>

            <div class="form-group">
                <label>Website</label>
                <input type="url" id="website" maxlength="150" placeholder="https://www.exemplo.pt">
            </div>

            <div class="form-group">
                <label>Descrição <span class="required">*</span></label>
                <textarea id="descricao" maxlength="500" required></textarea>
             </div>

            <div class="form-group">
                <label>URL da Imagem</label>
                <input type="url" id="url_imagem" maxlength="100">
            </div>

            <button type="submit">Guardar</button>

        </form>

        <div id="mensagem"></div>

    </div>
    
    <footer class="footer">
        <p>Tugartes e Tufícios © 2026</p>
    </footer>

 //falta tratar do script -Carla--------\\

    <script>
    document.getElementById("formulario").addEventListener("submit", function(e) {
    e.preventDefault();

    const dados = {
        nome: document.getElementById("nome").value.trim(),
        atividade: document.getElementById("atividade").value.trim(),
        distrito: document.getElementById("distrito").value.trim(),
        concelho: document.getElementById("concelho").value.trim(),
        morada: document.getElementById("morada").value.trim(),
        telefone: document.getElementById("telefone").value.trim(),
        email: document.getElementById("email").value.trim(),
        website: document.getElementById("website").value.trim(),
        descricao: document.getElementById("descricao").value.trim(),
        url_imagem: document.getElementById("url_imagem").value.trim()
    };

    if (
        !dados.nome ||
        !dados.atividade ||
        !dados.distrito ||
        !dados.concelho ||
        !dados.descricao
    ) {
        document.getElementById("mensagem").innerHTML =
            '<p class="erro">Preencha todos os campos obrigatórios.</p>';
        return;
    }

    if (dados.telefone && !/^[0-9]+$/.test(dados.telefone)) {
        document.getElementById("mensagem").innerHTML =
            '<p class="erro">O telefone deve conter apenas números.</p>';
        return;
    }

    console.log(dados);

    document.getElementById("mensagem").innerHTML =
        '<p class="sucesso">Registo validado com sucesso!</p>';

    
    });
    </script>
