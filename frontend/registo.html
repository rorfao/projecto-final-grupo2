    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"> -->

<body>

<!-- Adicionada a classe hero-interna 
<section class="hero hero-interna">
    <div class="hero-bg"></div>
    <div class="hero-overlay"></div>-->

    <header class="header">
        <div class="logo">
            <div class="logo-symbol"></div><img src="./assets/logo.jpg" alt="logo" height="50px">  
            <div>
                <div class="logo-title">TUGARTES<br>E TUFÍCIOS</div>
                <div class="logo-subtitle">FEITO COM AMOR</div>
            </div>
        </div>
        <nav class="header-menu">
            <a href="index.html">Home</a>
            <a href="catalogo.html">Catálogo</a>
            <a href="registo.html">Registo</a>
            <a href="about.html">Sobre Nós</a>
        </nav>
    </header>    


</section> 
   
    <!-- Formulário de Registo -->
    <div class="container-registo">
        <h5>Registo de Atelier</h5>

        <form id="formulario">

            <div class="form-group">
                <label for="nome">Nome <span class="required">*</span></label>
                <input type="text" id="nome" maxlength="150" required>
            </div>

            <div class="form-group">
                <label for="atividade">Atividade <span class="required">*</span></label>
                <input type="text" id="atividade" maxlength="50" required>
            </div>

            <div class="form-group">
                <label for="distrito">Distrito <span class="required">*</span></label>
                <select id="distrito" required>
                    <option value="">Selecione um distrito</option>
                </select>
            </div>

            <div class="form-group">
                <label for="concelho">Concelho <span class="required">*</span></label>
                <select id="concelho" required>
                    <option value="">Selecione um concelho</option>
                </select>
            </div>

            <div class="form-group">
                <label for="morada">Morada</label>
                <input type="text" id="morada" maxlength="200">
            </div>

            <div class="form-group">
                <label for="telefone">Telefone</label>
                <input type="tel" id="telefone" maxlength="15" placeholder="Ex: 912345678">
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" maxlength="100">
            </div>

            <div class="form-group">
                <label for="website">Website</label>
                <input type="url" id="website" maxlength="150" placeholder="https://www.exemplo.pt">
            </div>

            <div class="form-group">
                <label for="descricao">Descrição <span class="required">*</span></label>
                 <textarea id="descricao" rows="5" maxlength="500" required></textarea>
            <!-- O contador deve ficar aqui dentro, alinhado à direita com CSS puro -->
                 <div class="contador-container"> 
                    <small id="contadorDescricao">0 / 500 caracteres</small>
                 </div>
            </div>

            <div class="form-group">
                <label for="url_imagem">URL da Imagem</label>
                <input type="url" id="url_imagem" maxlength="100">
            </div>

             <!-- Zona para mensagens de erro/sucesso do JS -->
            <div id="mensagem"></div>

            <button type="submit">Submeter Registo</button>

        </form>

    </div> 

    <!-- Rodapé -->
    <footer class="footer">
        <p>Tugartes e Tufícios © 2026</p>
    </footer>

    <!--ficheiro JavaScript -->
    <script src="app.js"></script>
</body>
</html>
